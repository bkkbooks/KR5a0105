front:
  text: 上清大洞眞經玉訣音義叙蔵四
  hash: sha256:99cc66806cde8881c8d6b1082ccf30c82b9a1c5f0f6e3f100abab430f0dd3963
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0105_HFL_000-001a, image: hfl/0054/0054-004.png}
body:
  text: 大洞三景弟子眞靖大師賜紫陳景元譔大洞眞經三十九章品目尊嚴冠三洞寳經之首靈章祕祝玉檢隱書載之詳矣粤自西城緫眞君南極紫元君降授清虛眞人清虚傳授南嶽魏夫人曰子自不在山中隱身清齋虚中吐納者則大洞眞經不可妄讀也所以爾者妙音九徹眞聲髙唱文炁與玉虚參玄霞味與太陽俱暢動脣發吐則玉華立至諷詠靈句則𢹂契太上靜止接拱則紫房自觀思念所期則觸類感動所以七祖獲福受籙仙宫越從幽鬼俱宴朱陵斯文髙妙控駕晨舉乗景龍之上道非風塵流俗之所當爲也若在俗中讀之者則三官北帝微亂其音景聆炁穢不得明響上清聲參紫極之靈房矣青要紫書中央黄老君云得見大洞眞經三十九章便白日昇天而有修之者積年无成便謂經之不眞此皆坐由東華无金簡之目金闕无玉札之名眞靈不爲其降而爲天魔所來故有不感之効徒得神經萬亦不成矣向使先奏金簡於青宫奉玉札於帝皇得給金晨玉童西華玉女侍衞靈文普下諸天諸地三界稱善詠章萬徧豈有不致瓊輿紫軿之感邪此經降世唯句曲楊許眞人王屋司馬練師逮歷世髙道之士皆遵禀科格盟𧵥相傳口授諷誦之訣宻付混合之微故得名書金格躡景上清今也眞風湮散僞隱山棲道範不聞師資禮廢教法衰弊莫甚於斯景元緫角出家弱冠訪道遊歷僅三十載綱領十有餘年老歸茅山結菴懴悔自歎道縁蹇薄塵業深重雖孜孜教典而未遇眞師欲誦洞經詎敢開韞於是澡雪身心静務恭潔廣求古本先自考詳沉嘿披㝷反覆研搆一句一字未甞越畧或兩義相乖彌增回惑如發細作發煙之類是也或偏傍儳改字體浮雜如棲作𠾳作歌之類是也此蓋盗冩私傳相承訛謬遂將前軰修習之本前軰謂三洞法師觀妙先生朱自英三洞法師沖妙大卹皇甫希及皆誦洞經並天聖年中人及茅山藏本比對隱書輙撰音義兼䟽同異粗解所疑弗敢示諸法義聊自記其所覽乃三月齋心繕冩洞經玉訣一帙晨夕瞻禮仰竢靈人依科授受以償夙志也上清大洞眞經玉訣音義滅魔神慧玉清隱書内祝隱文道君玉注紫文丹章回元上法百神上法並音于此訣曰口訣並音決古本冩作決後人改作訣他皆類此晏景上音宴古經晏宴皆一體他皆類比晏寢茅山本作曲寢玉翰胡岸切後文翰同𤤠𤤠叶韻音央見唐光禄大夫太清觀主史崇一切道經音義攘據上汝羊切下居御切持也杖幡上直亮切持也或作伩音同攝衺似嗟切古本作邪檄落上刑狄切作激古歷或作敷雲璈音遨史崇云大琴也百和合唱赤亮切或作咽史崇云當作烟激无上古歷切四嵎音隅迅轡上峻信二音疾也下兵媚切整控上之郢切下苦貢切流盼普莧切古本作眄史崇音麵恊神飄津波史崇作恊晨褰趾上去焉切下音止足也褰或作騫紫軿音瓶車也烟灑所下切史崇所綺所寄二切汛也落也八冥音溟妙觀古段切歩北元茅山本作渉北元掇日上多活切連更音庚淒淒音妻或作淒莽莽莫黨切廣大无涯極之貌數來上色句切重虚館史崇館作觀玉髓息委切參聞上倉含切下聲參同監試上古衘切臨也下監庭同載勝音升史崇作戴勝秉簡上捕永切持也來冠古玩切回風上胡隈切說文轉也俗作廻非是舊作徊徘徊不進之貌說文本作裵回寛衣也取其裵回之狀他皆類此啜誤上抹劣切多言不止謂之啜或作掇非是也平生說文止也頭冠古玩切弁冕之總名他皆類此天湄旻悲切水涯也薄雲上音博迫也四嶺古本作領後同重扉上直龍切下音非古本作扉或音排排或音扉他同此獸騁丑郢切人互胡故切俗作㸦非是干景精太微小童名一作千景精神麾呼爲切旗屬也一本作魔非是裵回舊本並作徘徊今並依說文改作裵回後更不音飈輪上必遥切毫薈烏外切草盛貌蓊藹上烏董切下於蓋切後同元陽部命門一本作都命門侍明䆫史崇作䆫初江切一本作聦嬰蒙古本作矇後同晏盼普莧切說文引詩美目盼兮古本盼眄一例作䀎眄說文目偏合也一曰衮視與盼相乖後以義求之樂子上音洛下同解體胡貿切了悟也四射史崇食亦切或作四謝非是髙上埼史崇音竒曲岸也一本作琦嘯咤或作吒知加陟嫁二切說文叱怒也咄當没切說文呵也叱也嗟頃上咨鴉切說文咨也一曰痛惜一去頴切倐式竹切疾也走也古本作儵說文青黑繒發白色也一曰黑色歘許勿切說文有所吹起鐵羆斑麋切玃天厥縛切天獸名一本作攫啖毒徒濫切食也晶史崇胡了切又音魄史崇音巴按諸眞隱諱云北酆都鬼相魂名四天皛崩頺杜回切史崇云字宜作墳弇暉上衣檢切史崇云上宜作蝕日月相侵也髙上虚皇君道經第一長契一運古本一作壹七世一本作七祖投閒一本作關陵梵聞承切古本陵凌一例作凌後同世發玉蘭一本作蕳八曜一本作暉隨風離根配遷基達變入玄一本作遷棊達變入玄元一本有元素一字或讀者連下句云元素髙上神霄玉清王茅山藏本无元素二字今以茅山藏本爲定雌雄寄神化一本寄作竒百渾竒混古本混作潬俱入帝堂㑹按道君王注云易有者九天之上西北之門名也若旣登易有之門乃得升常堂之㑹室今按室字雖與上文恊韻宜從玉注以㑹字爲正波逺臺一本作波建臺上皇玉虚君道經第二爓爓音艷光也千劫始一周一本作十劫始一周皇上玉帝君道經第三玉帝有玄上之幡制命九天之階茅山本並无之字七覺承道數按道君玉注云七覺重悟幽冥朗㝷昧旦旣心曉朗然乃知㝷呼道數道數者洞眞帝一大洞之事也一本作七覺承數道恐誤飈粲北停華紫英唱東琳和九霄外玉符徴太微篇韻並不收无音可釋按消魔經入定品云飈粲停琅華紫桂何棲棲琳實鳴九霄玉節徵太㣲義與洞經同恐是棲傳寫之誤光蔚紆勿切史崇紆胃切文也後同眇眇靈景元靈一本作雲按道君玉注云自非眇㝷雲景而金房不登自非重誦洞章而玉賔不見也今詳靈景雲景二義未決旦從皇甫本作靈以竢眞師請問質疑森灑史崇所宜切空清華史崇云本名也皇甫本作青珠鬱羅一本珠作珠上皇先生紫晨君道經第四左旡英公子玄充叔一本作玄元叔雌一玉檢五老經亦云玄元叔太丹隱書洞眞玄經亦云玄充叙故有此二名靈關大漠下古本作摸靄沬莫佩切微晦也玄玄叔火王大丹隱書云下玄君叔火王字右回光王一本作玉玄洞四郷一本作洞一四郷號爲案延昌一本作安延昌和嬰太丹隱書云青炁君按延昌字合和嬰盼常在古本作䀎法无輪一本作去无輪太微天帝君道經第五洞陽鬱靈寳魂生金煥煥炁中精一本煥煥作耀耀拔殖後葉患一本作拔殞後世患史崇韻音還斫斷史崇上之藥切下徒管切後斷落同奣明七葉孫一本葉作華皇甫本作明明七葉孫茅山本作奣明史崇音義亦作奣鳥猛切按諸眞隱諱上玄眞明道君諱奣集韻古猛切明也與礦同音㪍沙玄㪍與孛同三元紫精君道經第六骨有玉英一本作映生樂音洛玉仙玉一本作五眞陽元老玄一君道經第七起非握節泥丸赤子右卿帝君名起非一本作排愼護波塵一本作鎭護披塵太上時非子一本作太時上非子上元太素三元君道經第八金符召度卿一本作郷恐協韻音作郷髙上消魔玉清王皇甫本茅山本並如上一本作髙上神霄玉清王知我者長生存我者不衰一本作知我者生存我不衰恃頼辟非恃一本作侍俠我史崇云上宜爲夾夾侍也巾金佩羽上居焮切以巾覆頂也焮看靳切登眞隱訣云巾金巾者天眞冠巾之名也不詳其製上清紫精三素君道經第九我一本无我字身生羽服飛升九天衢今按有我字則句讀完備紫精育華林按道君玉注云上清紫精之天中有樹其葉似竹而赤其華似鏡而明其子似李而无核名曰育華之林食其葉以辟飢食其華以不死食其實以飛仙所謂絳樹丹實色照五藏者也一本育作青倉王一本作滄玉衞此長夜㑹衞一本作漸重脣音純五老御日而質切青靈陽安元君道經第十望昌竭一本作謁連劫生劫一本作勃皇清洞眞道君道經第十一玉清洞明胎王一本无明字回素充一本作元長天生一本作長生天正薈條此三字是三元君内名誦至此宻念三過巳上一十九字見皇甫本别本並闕髙上太素君道經第十二號曰北臺君一本无君字回金太霞郷一本作卿日爽八騫修眞秘旨云日中眞君字髙騫爽一本作日華八騫按道君玉注云日華者日神之名八騫者月中之樹名也凡有八樹在月中也今詳爽華二義未㳏且從皇甫本作爽和歸落一本落作終結舒永一本結作吉皇上四老道中君道經第十三回風混帝心一本作徘徊混帝心號爲壽逸阜一本作輔亦曰澄潧渟一本作澄増停一本作澄増亭起福晨上靈一本作超福手執録籍一本作緑練魄空同史崇作洞音同月帝之功按道君玉注云月帝告功一本作日帝恐誤彈金鳴鍾按道君玉注云彈金鳴鈴一本作彈琴鳴鍾玉晨太上大道君道經第十四白光𤤠𤤠史崇音央衣我上衣旣切累枝流玄一本作顯慶流玄五嶽秀華一本作生華渡法全一本全作令太清大道君道經第十五熈怡史崇上之其切和也下作順與之切養也固身守關一本作門玄毋叔火王一本作玉更渾史崇上音庚下音混後同拔劫阿一本作狀劫阿太極大道元景君道經第十六膏膜史崇作髙幙音膏膜仰要一遥切下同帝室混身一道萬分一本作帝室混一六府煥爽一本作華固止身一本固作國皇初紫靈元君道經第十七五符啓扉一本作排古經扉多作棑音扉无英中眞上老君道經第十八玄充元素炁一本作玄元元素告胎中種鬼殃一本作積鬼其聖曰𠾳史崇上音粤下音哥皇甫本作歌非是其眞曰霐史崇鳥弘切皇甫本作𥦷一本作泓左曰音粤一本作日父寧在右曰音粵一本作月毋延精云日月者恐誤皆受帝一恩一本无一字受年祚一本作禄中央黄老君道經第十九玄葉得黄寧一本葉作華流生起福一本起作超散𡨚史崇作怨音𡨚把持玉清賔一本賔作君比孛通古本多作學音孛一本作比常通富元一本富作福一本作害一本作劫青精上眞内景君道經第二十反老生蓊鄔孔切蓊鬱草木茂貌史崇恊韻音翁艾容艾老也還白反嬰蒙一本作嬰童符籍晨燈經第八章云晨燈廣靈識按道君玉注云晨燈者乃玉眞天中有明炁之光同照於三兀之臺也今二十章雖玉注不解恐是此義一本作晨登二義未決且從皇甫本作晨燈道德仙王一本王作皇被服史崇上音披玉案史崇恊韻音安太陽九炁玉賢元君道經第二十一玉契被七祖一本被作披開隂太漠一本作幙飈景上必遥切太初九素金華景元君道經第二十二昱昱音育流汨于筆古没二切水流貌靖寂泥丸一本作精寂九天之一本作之門冥仲次一本冥作溟延命玉一本作王九皇上眞司命君道經第二十三晃曄上胡廣切下筠輙切福覆芳救切一本作履一本作慶五神號發烟一本作發紐二義未決令且從皇甫本作烟按金房内眞經云司命精魂發烟子樂音洛血穢殄平一本殄作彌起福三清一本起作超緑回絶冥按百神名天帝九關魂緑回道一本作禄回恐誤太一混生一本作大混一生恐誤掌堂逮一本作建元眇靈一本眇作䀎天皇上眞玉華三元君道經第二十四少腹上失召切今皇甫本凡少腹並作小腹回形帝先一本作光保解乗一本作保靜垂太一上元禁君道經第二十五煥然一本作渙將車梁此三字是日皇君内名誦至此宻念三過巳上一十九字見皇甫本别本並闕元虚黄房眞晨君道經第二十六月一本作日中桃君方盈眞炁月一本作日暉之色月一本作日中號方盈九眞中經云右手童子名方盈旣屬右手當是月字或云日字恐誤引月暉之炁一本作日暉開朗徹八䆫一本作聦令我羽籍玉帝之前按道君玉注云兆得虚无之道者則刻羽寳之籍登玉帝之前五老定符於玉宫之堂也一本作羽簡龍旍一木作旌遷連劫一本連作運太極主四眞人元君道經第二十七精𤤠一本作瑛音英童明史崇云宜作瞳解散胡賣切興幸一本作興牽四斗中眞七晨散華君道經第二十八散華飛華華散華並音花帝郷中玄生一本作帝卿太一渾風一本渾作揮爲我比神一本比作北三素牢張上按百神名云三素老君牢張上一本上字下有元字於義恐賸老君神生道固我魂逸遊一本魂作魄保兆六合腦乃皓切一本合作府白炁重鬱一本鬱作霧鮮曲玄一本曲作回辰中黄景元君道經第二十九二老在左右帝魂不可分按百神名二老謂三素老君牢張上中央玄一老子林虚夫也帝魂謂天紀帝魂照无阿也一本作三老在左右方帝魂不可不分恐誤子子保昌一本作保子未昌金闕後聖太平李眞天帝上景君道經第三十太帝八靈王一本作玉回合帝卿一本作郷種年之用切因爲孩嬰一本作月爲孩嬰太虚後聖无景彭室眞君道經第三十一太虚空无景按道君玉注云太虚之天有火山名曰空无景之山也一本作元景恐誤九雲合重扉一本作排音扉門下史崇協韻音戸禍害日日除一本除作治太玄都九炁丈人主仙君道經第三十二神廬音閭舍也古經廬多作盧音廬九曽升福堂史崇作墟去魚切北宴上清一本北作比長濟金房一本濟作躋上清八皇老君道經第三十三要靈上一遥切邀也年亨史崇許庚切皇甫本作享映遂一本作道一本作逐度連一本作運得全一本作金東華方諸宫髙晨師玉保王青童君道經第三十四玉保一本作寳司命精魂發烟子一本作發紐子按金房内眞經作司命精魂發烟子煥洞一本作煥爛玄解大魔情一本作太此大魔情靈標理魄一本作魂三徒塞絶一本作三塗絶破死炁一本作死栽扶桑太帝九老仙皇君道經第三十五下玄玄毋叔火王一本作下玄元毋叔火王一本作下元玄毋叔火生日明眞上而質切太帝精魂陽堂王一本作主映冠古玩切小有玉眞萬華先生主圖王君道經第三十六戸堀古經窟多作掘史崇音窟今諸方本直作窟朽骨蒙更蛻史崇音說云蟬去皮也集韻云蛻復蜟也復蜟蟬蛻也方超疑一本超作起玄洲二十九眞伯上帝司禁君道經第三十七膀胱旁光二音中央黄帝含光露諸方本第三十七章存思五帝法只有東南西北四帝都結云五帝皆闕中央黄帝一號唯三洞法師觀妙先生本有此中央黄帝含光露一號於存思之法始備更竢眞師請問質疑重羃上直龍切下音覓覆食巾也字又作幎被服上音披要佩上一遥切或本作腰繡帔史崇恊韻音披帷帳上于悲切幄也瓓玕䦨干二音轉藏去聲營機一本作機周流太一一本洞流作生均兩儀一本作二儀哺泥上音歩同心元素君一本素作炁字位爲天上君一本天作太開神華一本開作關太紀元一本太作大太元晨中君刋蛾眉山中洞宫玉戸太素君道經第三十八蛾眉或作峨嵋帝卿肇勒精一本勒作勤三秀柯音歌太无太素洞景幽玄按道君玉注云太无在洞景之表太素在幽玄之上九宫列金門於太素之天丹樓沓七重於太无之庭一本作太素洞景出幽入玄恐誤三五流化一本作三五流布恐是恊韻所音然下文巳有百神宣布且從皇甫本亦作化白元司月暮一本作月度一本作月夜心玄眇悟一本眇作妙西元龜山九靈眞仙毋青金丹皇后道經第三十九嬰蒙古經多作矇史崇音蒙枝史崇云累枝猶累代詵詵所臻切衆多貌受乗明一本乗作垂按登眞隱訣第二經傳條例云大洞眞經今世中有兩本一則大卷前有回風混合之道而辭旨假附多是浮僞一本唯有三十九章其中乃有數語與右英所說者同而互相混糅不可分别唯須親見眞本乃可遵用又聞有得楊許三十九章者與世中小本不殊自旣未眼見不測是非且宜繕冩以補品目又有玉注一卷即是畧釋洞經中旨亦可録也又按青要紫書金根經中央黄老君云得見大洞眞經三十九章便白日升天而有修之者積年无成便謂經之不眞此皆坐由東華无金簡之目金闕无玉札之名眞靈不爲其降而爲天魔所來故有不感之効徒得神經萬亦不成矣向使先奏金簡於青宫奉玉札於帝皇得給金晨玉童西華玉女侍衞靈丈普下諸天三界稱善詠章萬徧豈有不致瓊輿紫軿之感邪上清大洞眞經玉訣音義
