front:
  text: 上清大洞真經玉訣音義敘藏四
  hash: sha256:1fdf7aeb4c57d264723b1e5853143bc4e84259686ba5a73d10a7f574d4b9d53e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0105_HFL_000-001a, image: hfl/0054/0054-004.png}
body:
  text: 大洞三景弟子真靖大師賜紫陳景元撰大洞真經三十九章品目尊嚴冠三洞寶經之首靈章祕祝玉檢隱書載之詳矣粵自西城總真君南極紫元君降授清虛真人清虛傳授南嶽魏夫人曰子自不在山中隱身清齋虛中吐納者則大洞真經不可妄讀也所以爾者妙音九徹真聲髙唱文氣與玉虛參玄霞味與太陽俱暢動脣發吐則玉華立至諷詠靈句則攜契太上靜止接拱則紫房自觀思念所期則觸類感動所以七祖獲福受籙仙宫越從幽鬼俱宴朱陵斯文髙妙控駕晨舉乘景龍之上道非風塵流俗之所當為也若在俗中讀之者則三官北帝微亂其音景聆氣穢不得明響上清聲參紫極之靈房矣青要紫書中央黃老君云得見大洞真經三十九章便白日升天而有修之者積年無成便謂經之不真此皆坐由東華無金簡之目金闕無玉札之名真靈不為其降而為天魔所來故有不感之效徒得神經萬亦不成矣向使先奏金簡於青宫奉玉札於帝皇得給金晨玉童西華玉女侍衛靈文普下諸天諸地三界稱善詠章萬遍豈有不致瓊輿紫軿之感邪此經降世唯句曲楊許真人王屋司馬練師逮歷世髙道之士皆遵稟科格盟𧵥相傳口授諷誦之訣密付混合之微故得名書金格躡景上清今也真風湮散偽隱山棲道範不聞師資禮廢教法衰弊莫甚於斯景元總角出家弱冠訪道遊歷僅三十載綱領十有餘年老歸茅山結菴懴悔自歎道緣蹇薄塵業深重雖孜孜教典而未遇真師欲誦洞經詎敢開韞於是澡雪身心靜務恭潔廣求古本先自考詳沉默披尋反覆研搆一句一字未嘗越略或兩義相乖彌增回惑如發細作發煙之類是也或偏傍儳改字體浮雜如棲作𠾳作歌之類是也此蓋盜寫私傳相承訛謬遂將前輩修習之本前輩謂三洞法師觀妙先生朱自英三洞法師沖妙大恤皇甫希及皆誦洞經並天聖年中人及茅山藏本比對隱書輒撰音義兼疏同異粗解所疑弗敢示諸法義聊自記其所覽乃三月齋心繕寫洞經玉訣一帙晨夕瞻禮仰俟靈人依科授受以償夙志也上清大洞真經玉訣音義滅魔神慧玉清隱書內祝隱文道君玉注紫文丹章回元上法百神上法並音于此訣曰口訣並音決古本寫作決後人改作訣他皆類此晏景上音宴古經晏宴皆一體他皆類比晏寢茅山本作曲寢玉翰胡岸切後文翰同𤤠𤤠叶韻音央見唐光祿大夫太清觀主史崇一切道經音義攘據上汝羊切下居御切持也杖幡上直亮切持也或作伩音同攝邪似嗟切古本作邪檄落上刑狄切作激古歷或作敷雲璈音遨史崇云大琴也百和合唱赤亮切或作咽史崇云當作煙激無上古歷切四嵎音隅迅轡上峻信二音疾也下兵媚切整控上之郢切下苦貢切流盼普莧切古本作眄史崇音麵協神飄津波史崇作協晨褰趾上去焉切下音止足也褰或作騫紫軿音瓶車也煙灑所下切史崇所綺所寄二切汛也落也八冥音溟妙觀古段切步北元茅山本作涉北元掇日上多活切連更音庚淒淒音妻或作淒莽莽莫黨切廣大無涯極之貌數來上色句切重虛館史崇館作觀玉髓息委切參聞上倉含切下聲參同監試上古銜切臨也下監庭同載勝音升史崇作戴勝秉簡上捕永切持也來冠古玩切回風上胡隈切説文轉也俗作回非是舊作徊徘徊不進之貌説文本作裴回寬衣也取其裴回之狀他皆類此啜誤上抹劣切多言不止謂之啜或作掇非是也平生説文止也頭冠古玩切辨冕之總名他皆類此天湄旻悲切水涯也薄雲上音博迫也四嶺古本作領後同重扉上直龍切下音非古本作扉或音排排或音扉他同此獸騁丑郢切人互胡故切俗作㸦非是干景精太微小童名一作千景精神麾呼為切旗屬也一本作魔非是裴回舊本並作徘徊今並依説文改作裴回後更不音飈輪上必遙切毫薈烏外切草盛貌蓊藹上烏董切下於蓋切後同元陽部命門一本作都命門侍明窗史崇作窗初江切一本作聰嬰蒙古本作矇後同晏盼普莧切説文引詩美目盼兮古本盼眄一例作䀎眄説文目偏合也一曰衮視與盼相乖後以義求之樂子上音洛下同解體胡貿切了悟也四射史崇食亦切或作四謝非是髙上崎史崇音竒曲岸也一本作琦嘯吒或作吒知加陟嫁二切説文叱怒也咄當沒切説文呵也叱也嗟頃上咨鴉切説文咨也一曰痛惜一去頴切倐式竹切疾也走也古本作倏説文青黑繒發白色也一曰黑色歘許勿切説文有所吹起鐵羆斑麋切玃天厥縛切天獸名一本作攫啖毒徒濫切食也晶史崇胡了切又音魄史崇音巴按諸真隱諱云北酆都鬼相魂名四天皛崩頺杜回切史崇云字宜作墳弇暉上衣檢切史崇云上宜作蝕日月相侵也髙上虛皇君道經第一長契一運古本一作一七世一本作七祖投間一本作關陵梵聞承切古本陵凌一例作凌後同世發玉蘭一本作蕳八曜一本作暉隨風離根配遷基達變入玄一本作遷棊達變入玄元一本有元素一字或讀者連下句云元素髙上神霄玉清王茅山藏本無元素二字今以茅山藏本為定雌雄寄神化一本寄作竒百渾竒混古本混作灘俱入帝堂會按道君王注云易有者九天之上西北之門名也若既登易有之門乃得升常堂之會室今按室字雖與上文協韻宜從玉注以會字為正波逺臺一本作波建臺上皇玉虛君道經第二爓爓音艷光也千劫始一周一本作十劫始一周皇上玉帝君道經第三玉帝有玄上之幡制命九天之階茅山本並無之字七覺承道數按道君玉注云七覺重悟幽冥朗尋昧旦既心曉朗然乃知尋呼道數道數者洞真帝一大洞之事也一本作七覺承數道恐誤飈粲北停華紫英唱東琳和九霄外玉符徴太微篇韻並不收無音可釋按消魔經入定品云飈粲停琅華紫桂何棲棲琳實鳴九霄玉節徵太微義與洞經同恐是棲傳寫之誤光蔚紆勿切史崇紆胃切文也後同眇眇靈景元靈一本作雲按道君玉注云自非眇尋雲景而金房不登自非重誦洞章而玉賔不見也今詳靈景雲景二義未決旦從皇甫本作靈以俟真師請問質疑森灑史崇所宜切空清華史崇云本名也皇甫本作青珠鬱羅一本珠作珠上皇先生紫晨君道經第四左旡英公子玄充叔一本作玄元叔雌一玉檢五老經亦云玄元叔太丹隱書洞真玄經亦云玄充敘故有此二名靈關大漠下古本作摸靄沫莫佩切微晦也玄玄叔火王大丹隱書云下玄君叔火王字右回光王一本作玉玄洞四鄉一本作洞一四鄉號為案延昌一本作安延昌和嬰太丹隱書云青氣君按延昌字合和嬰盼常在古本作䀎法無輪一本作去無輪太微天帝君道經第五洞陽鬱靈寶魂生金煥煥氣中精一本煥煥作耀耀拔殖後葉患一本作拔殞後世患史崇韻音還斫斷史崇上之藥切下徒管切後斷落同奣明七葉孫一本葉作華皇甫本作明明七葉孫茅山本作奣明史崇音義亦作奣鳥猛切按諸真隱諱上玄真明道君諱奣集韻古猛切明也與礦同音勃沙玄勃與孛同三元紫精君道經第六骨有玉英一本作映生樂音洛玉仙玉一本作五真陽元老玄一君道經第七起非握節泥丸赤子右卿帝君名起非一本作排愼護波塵一本作鎮護披塵太上時非子一本作太時上非子上元太素三元君道經第八金符召度卿一本作鄉恐協韻音作鄉髙上消魔玉清王皇甫本茅山本並如上一本作髙上神霄玉清王知我者長生存我者不衰一本作知我者生存我不衰恃賴辟非恃一本作侍俠我史崇云上宜為夾夾侍也巾金佩羽上居焮切以巾覆頂也焮看靳切登真隱訣云巾金巾者天真冠巾之名也不詳其製上清紫精三素君道經第九我一本無我字身生羽服飛升九天衢今按有我字則句讀完備紫精育華林按道君玉注云上清紫精之天中有樹其葉似竹而赤其華似鏡而明其子似李而無核名曰育華之林食其葉以辟飢食其華以不死食其實以飛仙所謂絳樹丹實色照五藏者也一本育作青倉王一本作滄玉衛此長夜會衛一本作漸重脣音純五老御日而質切青靈陽安元君道經第十望昌竭一本作謁連劫生劫一本作勃皇清洞真道君道經第十一玉清洞明胎王一本無明字回素充一本作元長天生一本作長生天正薈條此三字是三元君內名誦至此密念三過巳上一十九字見皇甫本别本並闕髙上太素君道經第十二號曰北臺君一本無君字回金太霞鄉一本作卿日爽八騫修真祕旨云日中真君字髙騫爽一本作日華八騫按道君玉注云日華者日神之名八騫者月中之樹名也凡有八樹在月中也今詳爽華二義未㳏且從皇甫本作爽和歸落一本落作終結舒永一本結作吉皇上四老道中君道經第十三回風混帝心一本作徘徊混帝心號為壽逸阜一本作輔亦曰澄潧渟一本作澄增停一本作澄增亭起福晨上靈一本作超福手執録籍一本作緑練魄空同史崇作洞音同月帝之功按道君玉注云月帝告功一本作日帝恐誤彈金鳴鍾按道君玉注云彈金鳴鈴一本作彈琴鳴鍾玉晨太上大道君道經第十四白光𤤠𤤠史崇音央衣我上衣既切纍枝流玄一本作顯慶流玄五嶽秀華一本作生華渡法全一本全作令太清大道君道經第十五熙怡史崇上之其切和也下作順與之切養也固身守關一本作門玄毋叔火王一本作玉更渾史崇上音庚下音混後同拔劫阿一本作狀劫阿太極大道元景君道經第十六膏膜史崇作髙幕音膏膜仰要一遙切下同帝室混身一道萬分一本作帝室混一六府煥爽一本作華固止身一本固作國皇初紫靈元君道經第十七五符啓扉一本作排古經扉多作棑音扉無英中真上老君道經第十八玄充元素氣一本作玄元元素告胎中種鬼殃一本作積鬼其聖曰𠾳史崇上音粵下音哥皇甫本作歌非是其真曰霐史崇鳥弘切皇甫本作𥦷一本作泓左曰音粵一本作日父寧在右曰音粵一本作月毋延精云日月者恐誤皆受帝一恩一本無一字受年祚一本作祿中央黃老君道經第十九玄葉得黃寧一本葉作華流生起福一本起作超散𡨚史崇作怨音𡨚把持玉清賔一本賔作君比孛通古本多作學音孛一本作比常通富元一本富作福一本作害一本作劫青精上真內景君道經第二十反老生蓊塢孔切蓊鬱草木茂貌史崇協韻音翁艾容艾老也還白反嬰蒙一本作嬰童符籍晨燈經第八章云晨燈廣靈識按道君玉注云晨燈者乃玉真天中有明氣之光同照於三兀之臺也今二十章雖玉注不解恐是此義一本作晨登二義未決且從皇甫本作晨燈道德仙王一本王作皇被服史崇上音披玉案史崇協韻音安太陽九氣玉賢元君道經第二十一玉契被七祖一本被作披開隂太漠一本作幕飈景上必遙切太初九素金華景元君道經第二十二昱昱音育流汨于筆古沒二切水流貌靖寂泥丸一本作精寂九天之一本作之門冥仲次一本冥作溟延命玉一本作王九皇上真司命君道經第二十三晃曄上胡廣切下筠輒切福覆芳救切一本作履一本作慶五神號發煙一本作發紐二義未決令且從皇甫本作煙按金房內真經云司命精魂發煙子樂音洛血穢殄平一本殄作彌起福三清一本起作超緑回絶冥按百神名天帝九關魂緑回道一本作祿回恐誤太一混生一本作大混一生恐誤掌堂逮一本作建元眇靈一本眇作䀎天皇上真玉華三元君道經第二十四少腹上失召切今皇甫本凡少腹並作小腹回形帝先一本作光保解乘一本作保靜垂太一上元禁君道經第二十五煥然一本作渙將車梁此三字是日皇君內名誦至此密念三過巳上一十九字見皇甫本别本並闕元虛黃房真晨君道經第二十六月一本作日中桃君方盈真氣月一本作日暉之色月一本作日中號方盈九真中